image: $CI_REGISTRY_IMAGE/xanmod-toolchain:latest

variables:
  DEBFULLNAME: Alexandre Frade
  DEBEMAIL: kernel@xanmod.org
  KDEB_CHANGELOG_DIST: bookworm
  KCONFIG_CONFIG: CONFIGS/x86_64/config
  LLVM: 1
  jv: $((2*$(nproc)))
  gv: $(git rev-parse --short=7 HEAD)
  dv: $(git show -s --date=format:'%Y%m%d' --format=%cd)
  lv: $(make -s kernelversion)
  xv: $(cat localversion)
  rv: 0

before_script:
  - wget -O - https://dl.xanmod.org/${CI_ASSETS} | tar xvJ
  - echo $jobs
  - scripts/config --file $KCONFIG_CONFIG --set-str LOCALVERSION -x64v$isa --set-val X86_64_VERSION $isa
  - pvcmd="cat $KCONFIG_CONFIG | grep 'LOCALVERSION='" && export pv=$(eval $pvcmd | cut -d'"' -f2)
  - export mvcmd="make -j$jv KDEB_PKGVERSION=$lv$pv$xv-$rv~$dv.g"$gv" bindeb-pkg 2>&1 | tee ../build-$lv$pv$xv-$rv~$dv.g"$gv"_amd64.log && xz -e9 ../build-*$pv*"
  - export avcmd="mkdir -p assets/ && mv ../*$pv* assets/"

6.19 x64v2:
  tags: [saas-linux-xlarge-amd64]
  stage: build
  only:
  - branches
  variables:
    isa: 2
  script:
  - eval $mvcmd && eval $avcmd
  artifacts:
    name: "$CI_JOB_NAME~$CI_COMMIT_SHORT_SHA"
    expire_in: 2 weeks
    when: always
    paths:
    - assets/
    exclude:
    - assets/*dbg*
  timeout: 2h

6.19 x64v3:
  tags: [saas-linux-xlarge-amd64]
  stage: build
  only:
  - branches
  variables:
    isa: 3
  script:
  - eval $mvcmd && eval $avcmd
  artifacts:
    name: "$CI_JOB_NAME~$CI_COMMIT_SHORT_SHA"
    expire_in: 2 weeks
    when: always
    paths:
    - assets/
    exclude:
    - assets/*dbg*
  timeout: 2h
